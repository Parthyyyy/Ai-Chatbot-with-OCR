<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Speaking Avatar</title>  
  <style>
    #avatar-wrapper {
        position: fixed;
        /* Moved up slightly to clear the input bar */
        bottom: 90px; 
        right: 3vw;
        /* Dynamically scales based on screen size */
        width: clamp(150px, 25vw, 350px);
        height: clamp(150px, 25vw, 350px);
        /* Set Z-index lower than the chatbar so it goes behind it */
        z-index: 40; 
        pointer-events: none; 
    }
    #avatar-wrapper canvas {
        width: 100% !important;
        height: 100% !important;
        outline: none;
        pointer-events: auto;
    }
</style>
</head>

<body>
    <div id="avatar-wrapper"></div>

    <script type="module">
        console.log("✅ Avatar module script running");
        
        import * as THREE from 'https://esm.run/three@0.158.0';
        import { GLTFLoader } from 'https://esm.run/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

        let selectedAvatar = localStorage.getItem("selectedAvatar");
        let morphMesh = null;
        let morphDict = null;
        let morphInfluences = null;

        const container = document.getElementById("avatar-wrapper");
        const width = container.clientWidth || 300;
        const height = container.clientHeight || 300;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            if (!container) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(0, 1, 1).normalize();
        scene.add(light);

        camera.position.z = 1.5;

        let maleAvatar = null;
        let femaleAvatar = null;

        if (selectedAvatar === "male" || selectedAvatar === "female"){
          loadAvatar(selectedAvatar);
        }

        function loadAvatar(gender){
          const loader = new GLTFLoader();
          const path = gender === "male" ? "/static/684ff6e2227a9a0422181bcc.glb" : "/static/686b8e703856a81c484ed51e.glb";
          
          loader.load(path, (gltf) => {
            const avatar = gltf.scene;
            if (gender === "female"){
              avatar.position.y = -2.32;     
              avatar.position.x = 0;        
              avatar.rotation.y = 0.1;
            } else {
              avatar.position.y = -2.45;
              avatar.rotation.y = 0;
              avatar.position.x = 0;
            }

            avatar.scale.set(1.5, 1.5, 1.5);
            scene.add(avatar);

            if(gender === "male") maleAvatar = avatar;
            else femaleAvatar = avatar;

            initLipSync(avatar);
            animate();
          }, undefined, (error) => console.error("❌ Failed to load avatar:", error));
        }

        function initLipSync(avatarScene){
          avatarScene.traverse((node) =>{
            if (node.isMesh && node.name === "Wolf3D_Head" && node.morphTargetDictionary){
              morphMesh = node;
              morphDict = node.morphTargetDictionary;
              morphInfluences = node.morphTargetInfluences;
            }
          });
        }

        function animate() {
          requestAnimationFrame(animate);
          renderer.render(scene, camera);
        }

        // Web Audio API Lip Sync & DYNAMIC MUTE LOGIC
        let audioCtx, analyser, currentAudio, sourceNode;
        window.isAudioMuted = false; // Global mute state tracking

        window.setAudioMute = function(muteStatus) {
            window.isAudioMuted = muteStatus;
            if (currentAudio) {
                currentAudio.muted = muteStatus; // Applies dynamic HTML5 muting!
            }
        };

        function playAudioAndLipSync(audioUrl) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.connect(audioCtx.destination);
                
                currentAudio = new Audio();
                currentAudio.crossOrigin = "anonymous";
                sourceNode = audioCtx.createMediaElementSource(currentAudio);
                sourceNode.connect(analyser);
            }
            
            currentAudio.src = audioUrl;
            // Instantly apply the current mute state to the new audio
            currentAudio.muted = window.isAudioMuted; 
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function updateLipSync() {
                if (currentAudio.paused || currentAudio.ended || !morphMesh || !morphDict) return;
                
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;
                
                let mouthOpenValue = average / 60.0; 
                if (mouthOpenValue > 1.0) mouthOpenValue = 1.0;
                if (mouthOpenValue < 0.05) mouthOpenValue = 0.0; 
                
                // If audio is dynamically muted, close the mouth so it doesn't flap silently
                const mouthOpenIndex = morphDict["mouthOpen"];
                if (mouthOpenIndex !== undefined) {
                    morphInfluences[mouthOpenIndex] = window.isAudioMuted ? 0.0 : mouthOpenValue;
                }
                
                requestAnimationFrame(updateLipSync);
            }

            currentAudio.onplay = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                updateLipSync(); 
            };

            currentAudio.onended = () => {
                const mouthOpenIndex = morphDict["mouthOpen"];
                if (mouthOpenIndex !== undefined) morphInfluences[mouthOpenIndex] = 0.0;
            };

            currentAudio.play().catch(e => console.error("Audio play failed:", e));
        }

        window.avatarReady = true;
        window.playAudioAndLipSync = playAudioAndLipSync;

        window.setAvatarGender = function(gender) {
            if (!gender) return;
            selectedAvatar = gender;
            localStorage.setItem("selectedAvatar", gender);

            if (maleAvatar) maleAvatar.visible = false;
            if (femaleAvatar) femaleAvatar.visible = false;

            if (gender === "male") {
                if (!maleAvatar) loadAvatar("male");
                else maleAvatar.visible = true;
            } else if (gender === "female") {
                if (!femaleAvatar) loadAvatar("female");
                else femaleAvatar.visible = true;
            }
        };
    </script>
</body>
</html>
