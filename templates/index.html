<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIX: Prevent Favicon 404 Error -->
    <link rel="icon" href="data:,">
    <title>AI Document Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; }
        .chat-container { height: calc(100vh - 120px); scroll-behavior: smooth; }
        
        .message { max-width: 85%; margin: 12px; padding: 16px 20px; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .user-message { background-color: #3b82f6; color: white; margin-left: auto; border-radius: 20px 20px 4px 20px; }
        .bot-message { background-color: #ffffff; color: #1e293b; margin-right: auto; border-radius: 20px 20px 20px 4px; border: 1px solid #e2e8f0; }

        .custom-file-upload { border: 2px dashed #334155; border-radius: 16px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s ease; background-color: rgba(30, 41, 59, 0.5); }
        .custom-file-upload:hover { border-color: #3b82f6; background-color: rgba(30, 41, 59, 0.8); }
        
        /* FIX: High Z-Index ensures Chatbar is ALWAYS on top of the avatar */
        .input-wrapper { position: fixed; bottom: 24px; left: 1rem; right: 1rem; display: flex; align-items: center; background: white; padding: 8px 12px; border-radius: 100px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; z-index: 1000; }
        @media (min-width: 768px) { .input-wrapper { left: 17rem; right: 2rem; } }
        
        .input-field { flex: 1; border: none; padding: 12px 10px; background: transparent; outline: none; font-size: 1rem; color: #1e293b; min-width: 0; }
        
        .btn-modern { padding: 10px; border-radius: 100px; font-weight: 500; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;}
        @media (min-width: 768px) { .btn-modern { padding: 10px 20px; gap: 6px; } }
        
        .btn-primary { background: #3b82f6; color: white; }
        .btn-voice { background: #f1f5f9; color: #475569; margin-right: 8px; }
        
        body.dark-mode { background-color: #0f172a; }
        body.dark-mode .bot-message { background-color: #1e293b; color: #f8fafc; border-color: #334155; }
        body.dark-mode .input-wrapper { background: #1e293b; border-color: #334155; }
        body.dark-mode .input-field { color: #f8fafc; }
        body.dark-mode .btn-voice { background: #334155; color: #cbd5e1; }
        
        .typing-bubble { position: fixed; bottom: calc(5vh + clamp(150px, 25vw, 350px)); right: calc(3vw + clamp(150px, 25vw, 350px) / 2); transform: translateX(50%); background: #ffffff; padding: 10px 12px; border-radius: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: none; gap: 4px; z-index: 1000; }
        .typing-bubble span { width: 6px; height: 6px; background-color: #3b82f6; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-bubble span:nth-child(2){ animation-delay: 0.2s; } .typing-bubble span:nth-child(3){ animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity:0.2; transform: scale(1); } 20% { opacity:1; transform: scale(1.2); } 100% { opacity:0.2; transform: scale(1); } }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-hidden md:overflow-auto">

    <div class="flex flex-col md:flex-row h-screen">
        
        <!-- Sidebar -->
        <div class="sidebar w-full md:w-64 flex flex-col text-white p-4 md:p-6 shadow-xl z-20 shrink-0 h-auto md:h-full">
            <div class="flex items-center gap-3 mb-4 md:mb-10">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg">D</div>
                <h1 class="text-lg font-semibold tracking-wide">DocAssist AI</h1>
                <button id="theme-toggle-mobile" class="ml-auto md:hidden bg-slate-800 p-2 rounded-lg">🌙</button>
            </div>

            <div class="mb-4 md:mb-6">
                <div class="custom-file-upload" id="dropZone">
                    <svg class="w-8 h-8 md:w-10 md:h-10 mx-auto mb-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm font-medium text-slate-300">Drop Document</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.jpg,.png,.docx" multiple>
                </div>
            </div>

            <div class="hidden md:flex flex-col gap-3 mt-auto">
                <button id="changeAvatarBtn" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl transition">
                    🔄 Change Assistant
                </button>
                <button id="theme-toggle-desktop" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl transition">
                    🌙 Toggle Theme
                </button>
            </div>
        </div>

        <!-- Main Chat Interface -->
        <div class="flex-1 relative flex flex-col h-full bg-slate-50 dark:bg-slate-900 pb-20 md:pb-0">
            
            <div class="flex-1 p-4 md:p-6 overflow-y-auto chat-container" id="chatContainer">
                <div class="bot-message message shadow-sm">
                    ✨ Hello! I am your AI document assistant. Upload a file, and I'll analyze it for you!
                </div>
            </div>

            <div id="avatar-typing-bubble" class="typing-bubble">
                <span></span><span></span><span></span>
            </div>

            <div class="input-wrapper">
                <button id="muteToggleBtn" class="btn-modern btn-voice" title="Toggle Voice">🔊</button>
                <input type="text" id="userInput" class="input-field" placeholder="Ask anything...">
                <button id="sendButton" class="btn-modern btn-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    <span class="hidden md:inline">Send</span>
                </button>
            </div>

        </div>
    </div>

    <!-- Include Avatar 3D Logic ONLY ONCE -->
    {% include 'avatar.html' %}
    
    <div id="loadingSpinner" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="loader"></div>
    </div>

    <!-- Lightweight Emoji Modal -->
    <div id="avatarModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-80 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="flex flex-col md:flex-row gap-6 md:gap-10 p-8 bg-white rounded-2xl shadow-2xl text-center">
            <div class="cursor-pointer hover:scale-105 transition transform p-4" onclick="chooseAvatar('male')">
                <div class="w-32 h-32 md:w-40 md:h-40 bg-blue-100 rounded-full flex items-center justify-center text-6xl shadow-inner border-4 border-transparent hover:border-blue-500">👨‍💼</div>
                <p class="mt-3 font-semibold text-slate-800">Male Assistant</p>
            </div>
            <div class="cursor-pointer hover:scale-105 transition transform p-4" onclick="chooseAvatar('female')">
                <div class="w-32 h-32 md:w-40 md:h-40 bg-pink-100 rounded-full flex items-center justify-center text-6xl shadow-inner border-4 border-transparent hover:border-pink-500">👩‍💼</div>
                <p class="mt-3 font-semibold text-slate-800">Female Assistant</p>
            </div>
        </div>
    </div>

    <script>
        let isMuted = false;
        
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const chatContainer = document.getElementById('chatContainer');
            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const muteToggleBtn = document.getElementById('muteToggleBtn');
            const typingBubble = document.getElementById("avatar-typing-bubble");
            const spinner = document.getElementById("loadingSpinner");
            
            function showTyping() { if(typingBubble) typingBubble.style.display = "flex"; }
            function hideTyping() { if(typingBubble) typingBubble.style.display = "none"; }
            function showSpinner() { if(spinner) spinner.classList.remove('hidden'); }
            function hideSpinner() { if(spinner) spinner.classList.add('hidden'); }

            if(muteToggleBtn) {
                muteToggleBtn.addEventListener('click', () => {
                    isMuted = !isMuted;
                    muteToggleBtn.innerHTML = isMuted ? '🔇' : '🔊';
                    
                    // DYNAMIC MUTE: Tells the avatar to instantly toggle audio volume
                    if (window.setAudioMute) {
                        window.setAudioMute(isMuted);
                    }
                });
            }

            if(dropZone && fileInput) {
                dropZone.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', function() {
                    if (this.files.length === 0) return;
                    const formData = new FormData();
                    for (let i = 0; i < this.files.length; i++) formData.append('file', this.files[i]);
                    
                    showSpinner();
                    fetch('/upload', { method: 'POST', body: formData })
                    .then(res => res.json())
                    .then(data => {
                        hideSpinner();
                        if (data.success) {
                            addMessage(data.message, 'bot');
                            userInput.disabled = false;
                        } else addMessage(data.error || 'Upload failed', 'bot');
                    }).catch(err => { hideSpinner(); addMessage('Error uploading file', 'bot'); });
                });
            }

            function addMessage(text, sender) {
                const div = document.createElement('div');
                div.className = `message ${sender}-message`;
                div.textContent = text;
                chatContainer.appendChild(div);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function sendMessage() {
                const message = userInput.value.trim();
                if (!message) return;

                addMessage(message, 'user');
                userInput.value = '';
                userInput.disabled = true;
                showTyping();

                const currentGender = localStorage.getItem("selectedAvatar") || "male";

                fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: message, mute: false, gender: currentGender }) 
                    // Note: 'mute' is false here so backend ALWAYS sends audio. We mute locally instead!
                })
                .then(res => res.json())
                .then(data => {
                    hideTyping();
                    if (data.error) {
                        addMessage(data.error, 'bot');
                    } else {
                        addMessage(data.response, 'bot');
                        
                        // Always send audio to the lip-sync engine. Local mute handles volume.
                        if (data.audio_url) {
                            if (typeof window.playAudioAndLipSync === "function") {
                                window.playAudioAndLipSync(data.audio_url);
                            } else {
                                const backupAudio = new Audio(data.audio_url);
                                backupAudio.muted = isMuted;
                                backupAudio.play().catch(e => console.error(e));
                            }
                        }
                    }
                    userInput.disabled = false;
                    userInput.focus();
                })
                .catch(err => {
                    hideTyping();
                    addMessage('Error connecting to server.', 'bot');
                    userInput.disabled = false;
                });
            }

            if(sendButton) sendButton.addEventListener('click', sendMessage);
            if(userInput) userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

            // Theme Handlers
            const toggleTheme = () => {
                document.body.classList.toggle("dark-mode");
                const isDark = document.body.classList.contains("dark-mode");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                
                const mBtn = document.getElementById("theme-toggle-mobile");
                const dBtn = document.getElementById("theme-toggle-desktop");
                if (mBtn) mBtn.innerHTML = isDark ? "☀️" : "🌙";
                if (dBtn) dBtn.innerHTML = isDark ? "☀️ Toggle Theme" : "🌙 Toggle Theme";
            };

            const mBtn = document.getElementById("theme-toggle-mobile");
            const dBtn = document.getElementById("theme-toggle-desktop");
            if(mBtn) mBtn.addEventListener("click", toggleTheme);
            if(dBtn) dBtn.addEventListener("click", toggleTheme);
            if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark-mode");

            // Setup Avatar from Storage
            const saved = localStorage.getItem("selectedAvatar");
            if(saved === "male" || saved === "female"){
                const wait = setInterval(()=>{
                    if (window.setAvatarGender) { 
                        window.setAvatarGender(saved); 
                        clearInterval(wait); 
                    }
                }, 100);
            } else {
                document.getElementById("avatarModal").classList.remove("hidden");
            }

            const changeAvatarBtn = document.getElementById("changeAvatarBtn");
            if (changeAvatarBtn) {
                changeAvatarBtn.addEventListener("click", () => {
                    document.getElementById("avatarModal").classList.remove("hidden");
                });
            }
        });

        // Global Avatar Chooser
        window.chooseAvatar = function(gender) {
            localStorage.setItem("selectedAvatar", gender);
            document.getElementById("avatarModal").classList.add("hidden");
            if (window.setAvatarGender) {
                window.setAvatarGender(gender);
            } else {
                const wait = setInterval(() => {
                    if (window.setAvatarGender) { 
                        window.setAvatarGender(gender); 
                        clearInterval(wait); 
                    }
                }, 100);
            }
        };
    </script>
</body>
</html>
